<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events - Kerala Events Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="aesthetic-theme dark-theme">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <header class="glass-header">
        <div class="header-content">
            <h1><span class="gradient-text">Kerala</span> Events Hub</h1>
            <nav>
                <a href="index.html" class="nav-link">Home</a>
                <a href="dashboard.html" class="nav-link">All Events</a>
                <a href="my-events.html" class="nav-link active">My Events</a>
                <a href="profile.html" class="nav-link"><i class='bx bx-user-circle'></i> Profile</a>
                <a href="#" class="nav-link" id="logout-link">Logout</a>
            </nav>
        </div>
    </header>

    <main>
        <section style="text-align: center; margin-bottom: 3rem;">
            <h2>My <span class="gradient-text">Registered Events</span></h2>
            <p style="color: #94a3b8; font-size: 1.1rem; margin-top: 0.5rem;">You have <span id="event-count" style="color: white; font-weight: bold;">0</span> registered events</p>
        </section>

        <section id="registered-events">
            <div id="events-container" style="display: flex; flex-direction: column; gap: 1.5rem; max-width: 800px; margin: 0 auto;">
                <!-- Cards injected by fetchMyEvents() -->
                <div id="my-events-loading" style="text-align:center;padding:4rem;color:#94a3b8;">
                    <i class='bx bx-loader-alt' style="font-size:2.5rem;display:block;margin-bottom:1rem;animation:spin 1s linear infinite;"></i>
                    Loading your events...
                </div>
            </div>
        </section>
    </main>

    <footer class="glass-footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Kerala Events Hub. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const API_BASE = window.location.hostname ? `http://${window.location.hostname}:3000` : 'http://localhost:3000';

        // Inject spin animation
        const styleEl = document.createElement('style');
        styleEl.textContent = `@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }`;
        document.head.appendChild(styleEl);

        function checkAuth() {
            const userData = localStorage.getItem('keralaEventsUser');
            if (!userData) { window.location.href = 'login.html'; return false; }
            return JSON.parse(userData);
        }

        function buildMyEventCard(ev) {
            const isConfirmed = (ev.status || 'confirmed') === 'confirmed';
            const statusHtml = isConfirmed
                ? `<span style="background:rgba(16,185,129,0.2);color:#34d399;padding:0.3rem 0.8rem;border-radius:50px;font-size:0.8rem;border:1px solid rgba(16,185,129,0.3);"><i class='bx bx-check-circle'></i> Confirmed</span>`
                : `<span style="background:rgba(245,158,11,0.2);color:#fbbf24;padding:0.3rem 0.8rem;border-radius:50px;font-size:0.8rem;border:1px solid rgba(245,158,11,0.3);"><i class='bx bx-time'></i> Pending</span>`;

            const dateStr = ev.date
                ? new Date(ev.date).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' })
                : 'TBA';
            const regId = 'REG' + String(ev.registration_id || 0).padStart(5, '0');
            const registeredAt = ev.registered_at
                ? new Date(ev.registered_at).toLocaleDateString('en-IN')
                : 'N/A';

            const div = document.createElement('div');
            div.className = 'glass-card hover-up registered-event-card';
            div.dataset.eventId = ev.event_id || ev.id;
            div.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:1rem;">
                    <h3 style="color:white;font-size:1.4rem;margin:0;">${ev.title}</h3>
                    ${statusHtml}
                </div>
                <div style="color:#94a3b8;line-height:1.8;margin-bottom:1.5rem;">
                    <p><i class='bx bx-calendar'></i> <strong style="color:#cbd5e1;">Date:</strong> ${dateStr}</p>
                    <p><i class='bx bx-id-card'></i> <strong style="color:#cbd5e1;">Registration ID:</strong> ${regId}</p>
                    <p><i class='bx bx-time-five'></i> <strong style="color:#cbd5e1;">Registered on:</strong> ${registeredAt}</p>
                </div>
                <div style="display:flex;gap:1rem;">
                    <a href="event-registration.html?event=${ev.event_id || ev.id}" class="btn btn-primary btn-glow" style="flex:1;text-align:center;">View Details</a>
                    <button class="btn btn-secondary btn-cancel" style="flex:1;border-color:rgba(239,68,68,0.4);color:#fca5a5;" data-regid="${ev.registration_id}">Cancel</button>
                </div>`;
            return div;
        }

        async function fetchMyEvents() {
            const userData = checkAuth();
            if (!userData) return;

            const container = document.getElementById('events-container');
            const countEl = document.getElementById('event-count');

            if (!userData.id) {
                container.innerHTML = `
                    <div class="glass-card" style="text-align:center;padding:3rem;color:#94a3b8;">
                        <i class='bx bx-info-circle' style="font-size:3rem;display:block;margin-bottom:1rem;color:#6366f1;"></i>
                        <p style="margin-bottom:1rem;">Your session does not have a server-linked ID. Please log in again.</p>
                        <a href="login.html" class="btn btn-primary btn-glow" style="display:inline-block;">Re-Login</a>
                    </div>`;
                return;
            }

            try {
                const res = await fetch(API_BASE + '/api/my-events/' + userData.id);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const events = await res.json();

                container.innerHTML = '';
                if (countEl) countEl.textContent = events.length;

                if (events.length === 0) {
                    container.innerHTML = `
                        <div class="glass-card" style="text-align:center;padding:3rem;color:#94a3b8;">
                            <i class='bx bx-calendar-x' style="font-size:3rem;display:block;margin-bottom:1rem;color:#a855f7;"></i>
                            <p style="font-size:1.1rem;margin-bottom:1rem;">You haven't registered for any events yet.</p>
                            <a href="dashboard.html" class="btn btn-primary btn-glow" style="display:inline-block;">Explore Events</a>
                        </div>`;
                    return;
                }

                events.forEach(ev => container.appendChild(buildMyEventCard(ev)));

            } catch (err) {
                console.warn('Could not fetch my events:', err.message);
                container.innerHTML = `
                    <div class="glass-card" style="text-align:center;padding:3rem;color:#94a3b8;">
                        <i class='bx bx-error-circle' style="font-size:3rem;display:block;margin-bottom:1rem;color:#f87171;"></i>
                        <p>Could not load your events from the server.</p>
                        <p style="font-size:0.85rem;margin-top:0.5rem;">Make sure the backend is running: <code style="color:#a855f7;">cd server &amp;&amp; node index.js</code></p>
                    </div>`;
            }
        }

        // Cancel button via event delegation
        document.addEventListener('click', async function(e) {
            const btn = e.target.closest('.btn-cancel');
            if (!btn) return;
            if (!confirm('Cancel your registration for this event?')) return;

            const registrationId = btn.dataset.regid;
            if (!registrationId) return;

            try {
                const res = await fetch(`${API_BASE}/api/registrations/${registrationId}`, {
                    method: 'DELETE'
                });
                if (!res.ok) throw new Error('Failed to cancel registration');
                const card = btn.closest('.registered-event-card');
                if (card) {
                    card.style.transition = 'opacity 0.4s';
                    card.style.opacity = '0';
                    setTimeout(() => {
                        card.remove();
                        const countEl = document.getElementById('event-count');
                        if (countEl) countEl.textContent = Math.max(0, parseInt(countEl.textContent || '0') - 1);
                    }, 400);
                }
            } catch (err) {
                console.error('Cancellation failed:', err);
                alert('Could not cancel registration. Please try again later.');
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            const userData = checkAuth();
            if (userData) {
                const logoutLink = document.getElementById('logout-link');
                if (logoutLink) {
                    logoutLink.addEventListener('click', function(e) {
                        e.preventDefault();
                        localStorage.removeItem('keralaEventsUser');
                        window.location.href = 'index.html';
                    });
                }
                fetchMyEvents();
            }
        });
    </script>
</body>
</html>
